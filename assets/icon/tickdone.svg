<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Hintergrund mit abgerundeten Ecken -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- Klemmbrett-Flaeche -->
  <rect x="56" y="48" width="144" height="168" rx="16" fill="#f8fafc"/>
  <!-- Klemme oben -->
  <rect x="104" y="36" width="48" height="26" rx="8" fill="#cbd5e1"/>
  <!-- Aufgabe 1 (erledigt) -->
  <circle cx="86" cy="98" r="11" fill="#22c55e"/>
  <path d="M80 98 l5 5 l8 -10" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="106" y="92" width="74" height="11" rx="5" fill="#94a3b8"/>
  <!-- Aufgabe 2 (offen) -->
  <circle cx="86" cy="138" r="11" fill="none" stroke="#94a3b8" stroke-width="3"/>
  <rect x="106" y="132" width="74" height="11" rx="5" fill="#cbd5e1"/>
  <!-- Unteraufgabe (eingerueckt, offen) -->
  <circle cx="112" cy="174" r="9" fill="none" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="130" y="169" width="50" height="9" rx="4" fill="#e2e8f0"/>
</svg>
