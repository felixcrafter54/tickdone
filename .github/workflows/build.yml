# Baut testbare Pakete: Windows-EXE, Android-APK und das Web-Image.
#
# Minuten-Haushalt (Free-Plan, Windows zaehlt doppelt!):
# - Voll-Builds laufen NUR auf main (nach dem Merge) und manuell
#   (Actions-Tab -> Run workflow).
# - Pull Requests bekommen nur den billigen Pruef-Job (analyze + test,
#   Ubuntu, ~3 Minuten) statt ~16 abgerechneter Minuten pro Push.
# - concurrency: schnelle aufeinanderfolgende Merges canceln alte Laeufe.
name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Billiger PR-Check: nur Analyse + Tests (keine Builds, keine Artefakte).
  pruefung:
    name: Analyse + Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  windows:
    name: Windows-EXE
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      - name: Tests ausführen
        run: flutter test

      - name: Windows-Build (Release)
        run: flutter build windows --release

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-windows
          path: build/windows/x64/runner/Release/
          retention-days: 7

  android:
    name: Android-APK
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      # Festen Release-Keystore aus den Secrets herstellen. Fehlen die
      # Secrets (z.B. Fork), wird ohne key.properties gebaut -> Debug-Signatur.
      - name: Release-Keystore einrichten
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: APK bauen (Release)
        run: flutter build apk --release

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # Web-Build + Docker-Image nach GHCR (:latest). Der Flutter-Build laeuft als
  # CI-Schritt (nicht im Docker), das schlanke Dockerfile kopiert nur build/web.
  web-image:
    name: Web-Image (GHCR)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      - name: Web-Build (Release)
        # Flutters SW ist deprecated -> abschalten (--pwa-strategy=none); Offline
        # + Updates macht unser eigener web/sw.js. --no-web-resources-cdn buendelt
        # CanvasKit lokal (same-origin), damit die App auch offline rendert.
        run: flutter build web --release --pwa-strategy=none --no-web-resources-cdn

      - name: Web-Dateien als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-web
          path: build/web
          retention-days: 7

      - name: Image-Name (lowercase) bestimmen
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tickdone-web" >> "$GITHUB_OUTPUT"

      - name: An GHCR anmelden
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        env:
          # Kein Build-Record-Artefakt (unnoetig, kostet Storage).
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: deploy/web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          # Nur :latest (kein :sha-Tag mehr) -> alte main-Images werden untagged
          # und lassen sich unten aufraeumen. Feste Versionen macht release.yml.
          tags: ${{ steps.img.outputs.name }}:latest

      # Alte, jetzt ungetaggte Images entfernen (die :vX.Y.Z-Releases bleiben,
      # weil sie getaggt sind). Best-effort: schlaegt es fehl, bricht der Build
      # nicht ab.
      - name: Ungetaggte GHCR-Images aufraeumen
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: tickdone-web
          package-type: container
          delete-only-untagged-versions: 'true'
          min-versions-to-keep: 2
