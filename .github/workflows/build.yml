# Baut testbare Pakete: Windows-EXE und Android-APK.
# Läuft bei jedem Push und lässt sich im Actions-Tab manuell starten.
# Die Ergebnisse hängen als Artefakte am jeweiligen Lauf (Zip-Download).
name: Build

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    name: Windows-EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      - name: Tests ausführen
        run: flutter test

      - name: Windows-Build (Release)
        run: flutter build windows --release

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-windows
          path: build/windows/x64/runner/Release/

  android:
    name: Android-APK
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      # Festen Release-Keystore aus den Secrets herstellen. Fehlen die
      # Secrets (z.B. Fork), wird ohne key.properties gebaut -> Debug-Signatur.
      - name: Release-Keystore einrichten
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: APK bauen (Release)
        run: flutter build apk --release

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-android
          path: build/app/outputs/flutter-apk/app-release.apk

  # Web-Build + Docker-Image nach GHCR. Der Flutter-Build laeuft als CI-Schritt
  # (nicht im Docker), das schlanke Dockerfile kopiert nur build/web -> derselbe
  # Dockerfile funktioniert lokal wie in der CI. Gepusht wird nur von main.
  web-image:
    name: Web-Image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        run: flutter pub get

      - name: Web-Build (Release)
        run: flutter build web --release

      - name: Web-Dateien als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tickdone-web
          path: build/web

      - name: Image-Name (lowercase) bestimmen
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tickdone-web" >> "$GITHUB_OUTPUT"

      # Login + Push nur auf main (bei anderen Branches/PRs nur bauen/testen).
      - name: An GHCR anmelden
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
