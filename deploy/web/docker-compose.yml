# Tickdone-Web-Container hinter dem bestehenden Nginx Proxy Manager (NPM).
# NPM macht SSL + Forward auf diesen Container; hier liegt die Proxy-Config.
#
# EINE Datei, zwei Wege:
#  - SERVER (Image aus GHCR ziehen, kein Flutter/Quellcode noetig):
#      docker compose -f deploy/web/docker-compose.yml pull
#      docker compose -f deploy/web/docker-compose.yml up -d
#  - LOKAL (selbst bauen; vorher `flutter build web --release`, build/web noetig):
#      docker compose -f deploy/web/docker-compose.yml up --build
#
# Die CalDAV-Server-Adresse kommt aus CALDAV_HOST (nicht im Image!). Am
# einfachsten via .env-Datei neben dieser Compose-Datei (deploy/web/.env,
# nicht in git). Siehe .env.example.
services:
  tickdone-web:
    image: ghcr.io/felixcrafter54/tickdone-web:latest
    build:
      # Kontext = Repo-Wurzel, damit das Dockerfile build/web findet.
      context: ../..
      dockerfile: deploy/web/Dockerfile
    container_name: tickdone-web
    restart: unless-stopped
    environment:
      # Zielserver – aus deploy/web/.env (CALDAV_HOST=...). Pflicht.
      CALDAV_HOST: ${CALDAV_HOST:?CALDAV_HOST fehlt – in deploy/web/.env setzen}
    # Zum lokalen Testen einen Port veröffentlichen; für den Betrieb hinter NPM
    # nicht nötig (NPM erreicht den Container über das gemeinsame Docker-Netz).
    ports:
      - "8085:80"
    # Für NPM: dieses Netz auf das NPM-Netz setzen (Name aus eurer NPM-Instanz),
    # dann im NPM als Forward-Host "tickdone-web", Port 80 eintragen.
    # networks: [npm]

# networks:
#   npm:
#     external: true
